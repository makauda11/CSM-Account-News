    function getWeek() {
      const n = new Date(2026,2,20);
      const d = n.getDay(), diff = n.getDate()-d+(d===0?-6:1);
      const m = new Date(n); m.setDate(diff);
      return `Semana del ${m.getDate()} ${m.toLocaleString("es-ES",{month:"short"})} ${m.getFullYear()}`;
    }
    function hexToRgb(hex) {
      return { r:parseInt(hex.slice(1,3),16), g:parseInt(hex.slice(3,5),16), b:parseInt(hex.slice(5,7),16) };
    }
    function darken(hex, amt=0.3) {
      const {r,g,b} = hexToRgb(hex);
      return `rgb(${Math.max(0,Math.floor(r*(1-amt)))},${Math.max(0,Math.floor(g*(1-amt)))},${Math.max(0,Math.floor(b*(1-amt)))})`;
    }

    function Logo({ domain, name, size=46 }) {
      const [err, setErr] = useState(false);
      const initials = name.split(" ").slice(0,2).map(w=>w[0]).join("").toUpperCase();
      if (err) return (
        <div style={{width:size,height:size,borderRadius:10,background:"rgba(255,255,255,0.18)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*0.32,fontWeight:700,color:"#fff",flexShrink:0}}>{initials}</div>
      );
      return (
        <div style={{width:size,height:size,borderRadius:10,background:"#fff",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,overflow:"hidden"}}>
          <img src={`https://logo.dev/${domain}?token=pk_V09GpPbCSk2tJGJhfEerXw`} alt={name} onError={()=>setErr(true)} style={{width:size-6,height:size-6,objectFit:"contain"}}/>
        </div>
      );
    }

    function LinkBtn({ href, label, color="#1E2EDE" }) {

      return (

          style={{display:"inline-flex",alignItems:"center",gap:4,fontSize:11,fontWeight:700,color,textDecoration:"none",marginTop:6,background:`${color}18`,borderRadius:6,padding:"3px 9px",border:`1px solid ${color}30`}}>
          {label} <span style={{fontSize:10}}>↗</span>
        </a>
      );
    }

          <div style={{fontSize:13,color:"#374151",lineHeight:1.6}}>{children}</div>
        </div>
      );
    }

                <div style={{fontSize:10,fontWeight:700,color:"#9ca3af",textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>🎫 Último ticket Linear</div>
                {ticket ? (
                  <>
                    <div style={{fontSize:13,fontWeight:700,color:NAVY,marginBottom:4}}>{ticket.title}</div>
                    <span style={{fontSize:11,background:"#e0e7ff",color:"#3730a3",borderRadius:6,padding:"2px 9px",fontWeight:700,display:"inline-block",marginBottom:6}}>{ticket.status}</span>
                    <div style={{fontSize:12.5,color:"#374151",lineHeight:1.55,marginBottom:4}}>{ticket.desc}</div>
                    <LinkBtn href={client.linearUrl} label="Ver en Linear" color="#5B4FE9"/>
                  </>
                ) : (
                  <div style={{fontSize:12.5,color:"#9ca3af",fontStyle:"italic"}}>Sin tickets activos en Linear para este cliente.</div>
                )}
              </div>
            </div>

            <div style={{marginBottom:16,paddingBottom:16,borderBottom:"0.5px solid #f3f4f6"}}>
              <Section icon="💼" label="Última actividad LinkedIn" color="#0077b5">{client.linkedin}</Section>
            </div>

            <div style={{background:"#fff7ed",borderRadius:10,padding:"14px 16px",borderLeft:"4px solid #ea580c"}}>
              <div style={{fontSize:10,fontWeight:800,color:"#ea580c",textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>🎯 Acción CSM esta semana</div>
              <div style={{fontSize:13.5,color:"#7c2d12",lineHeight:1.6,fontWeight:600}}>{client.action}</div>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [filter, setFilter] = useState("all");
      const [refreshing, setRefreshing] = useState(false);
      const [gmailData, setGmailData] = useState({});
      const [linearData, setLinearData] = useState({});

      async function fetchGmailForClient(client) {
        try {
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method:"POST", headers:{"Content-Type":"application/json"},
            body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:1000,
              system:"You are a CSM assistant. Search Gmail for the most recent email related to the given client. Return ONLY a JSON object with keys: subject, from, date, summary. No markdown, no extra text.",
              messages:[{role:"user",content:`Search Gmail for the most recent email related to client: ${client.name}. Return JSON with subject, from, date, summary.`}],
              mcp_servers:[{type:"url",url:"https://gmail.mcp.claude.com/mcp",name:"gmail-mcp"}]
            })
          });
          const data = await res.json();
          const text = data.content?.filter(b=>b.type==="text").map(b=>b.text).join("");
          const parsed = JSON.parse(text.replace(/```json|```/g,"").trim());
          setGmailData(p=>({...p,[client.id]:parsed}));
        } catch { setGmailData(p=>({...p,[client.id]:null})); }
      }

      async function fetchLinearForClient(client) {
        try {
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method:"POST", headers:{"Content-Type":"application/json"},
            body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:1000,
              system:"You are a CSM assistant. Search Linear for the most recent issue related to the given client. Return ONLY a JSON object with keys: title, status, desc, url. No markdown, no extra text.",
              messages:[{role:"user",content:`Search Linear for the most recent issue for client: ${client.name}. Return JSON with title, status, desc, url.`}],
              mcp_servers:[{type:"url",url:"https://mcp.linear.app/mcp",name:"linear-mcp"}]
            })
          });
          const data = await res.json();
          const text = data.content?.filter(b=>b.type==="text").map(b=>b.text).join("");
          const parsed = JSON.parse(text.replace(/```json|```/g,"").trim());
          setLinearData(p=>({...p,[client.id]:parsed}));
        } catch { setLinearData(p=>({...p,[client.id]:null})); }
      }

      async function handleRefreshAll() {
        setRefreshing(true);
        await Promise.all(clients.map(c => Promise.all([fetchGmailForClient(c), fetchLinearForClient(c)])));
        setRefreshing(false);
      }

      const counts = { all:clients.length, red:clients.filter(c=>c.health==="red").length, yellow:clients.filter(c=>c.health==="yellow").length, green:clients.filter(c=>c.health==="green").length };

      return (
        <div style={{background:"#f1f4fb",minHeight:"100vh"}}>
          {/* Banner */}
          <div style={{position:"relative",width:"100%",overflow:"hidden"}}>
            <img src="https://www.applivery.com/wp-content/themes/applivery/assets/images/og-image.jpg"
              onError={e=>{e.target.style.display="none";document.getElementById("banner-fallback").style.display="flex";}}
              style={{width:"100%",objectFit:"cover",objectPosition:"center top",display:"block",maxHeight:200}} alt="Applivery banner"/>
            <div id="banner-fallback" style={{display:"none",background:`linear-gradient(135deg, ${NAVY} 0%, #1E2EDE 100%)`,height:160,alignItems:"center",padding:"28px 40px"}}>
              <div style={{fontSize:24,fontWeight:900,color:"#fff"}}>Applivery</div>
            </div>
            <div style={{position:"absolute",bottom:0,left:0,right:0,background:"linear-gradient(to top, rgba(10,15,46,0.85) 0%, transparent 100%)",padding:"20px 32px 14px",display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
              <div>
                <div style={{fontSize:15,fontWeight:700,color:"#fff"}}>Briefing Semanal de Clientes</div>
                <div style={{fontSize:12,color:"rgba(255,255,255,0.7)",marginTop:2}}>{getWeek()} · Jorge Macauda</div>
              </div>
              <button onClick={handleRefreshAll} disabled={refreshing} style={{background:refreshing?"rgba(255,255,255,0.1)":"rgba(255,255,255,0.18)",border:"1px solid rgba(255,255,255,0.35)",color:"#fff",borderRadius:8,padding:"7px 16px",cursor:refreshing?"not-allowed":"pointer",fontSize:12,fontWeight:700,display:"flex",alignItems:"center",gap:6,opacity:refreshing?0.7:1}}>
                <span style={{display:"inline-block",animation:refreshing?"spin 1s linear infinite":"none"}}>↻</span>
                {refreshing?"Actualizando...":"Actualizar datos"}
              </button>
            </div>
          </div>

          {/* Filters */}
          <div style={{background:"#fff",borderBottom:"0.5px solid #e5e7eb",padding:"12px 32px",display:"flex",alignItems:"center",gap:8}}>
            {[["all","Todos","#f1f4fb","#374151"],["red","En riesgo","#fee2e2","#dc2626"],["yellow","Atención","#fef3c7","#b45309"],["green","Saludables","#dcfce7","#16a34a"]].map(([v,l,bg,c])=>(
              <button key={v} onClick={()=>setFilter(v)} style={{background:filter===v?bg:"transparent",color:filter===v?c:"#6b7280",border:filter===v?`1.5px solid ${c}`:"1px solid #e5e7eb",borderRadius:20,padding:"5px 14px",fontSize:12,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>
                {l} <span style={{background:filter===v?c:"#e5e7eb",color:filter===v?"#fff":"#6b7280",borderRadius:10,padding:"0 7px",fontSize:10.5,fontWeight:800}}>{counts[v]}</span>
              </button>
            ))}
          </div>

          {/* Cards */}
          <div style={{padding:"24px 32px"}}>
            {clients.map(c=><ClientCard key={c.id} client={c} filter={filter} liveEmail={gmailData[c.id]} liveTicket={linearData[c.id]}/>)}
            <div style={{textAlign:"center",fontSize:11,color:"#9ca3af",marginTop:8}}>Generado por Applivery CSM Agent · Jorge Macauda</div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
